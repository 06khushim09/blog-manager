<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Blog - Blog Manager</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- =========================
            Navbar
    ========================== -->

    <header>

        <nav>

            <h2>Blog Manager</h2>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="add-blog.html" class="active">Add Blog</a></li>

                <li><a href="index.html#blogs">View Blogs</a></li>

                <li><a href="login.html">Login</a></li>

            </ul>

        </nav>

    </header>

    <!-- =========================
            Main
    ========================== -->

    <main>

        <section class="page-header">

            <h1>Create New Blog</h1>

            <p>Share your ideas with the world.</p>

        </section>

        <section class="form-container">

            <form id="blogForm">

                <p id="successMessage" class="success"></p>

                <!-- Blog Title -->

                <label for="title">Blog Title</label>

                <input
                    type="text"
                    id="title"
                    placeholder="Enter your Blog Title"
                >

                <p id="titleError" class="error"></p>

                <!-- Author -->

                <label for="author">Author Name</label>

                <input
                    type="text"
                    id="author"
                    placeholder="Enter author name"
                >

                <p id="authorError" class="error"></p>

                <!-- Blog Content -->

                <label for="content">Blog Content</label>

                <p id="charCount">Characters: 0 / 500</p>

                <textarea
                    id="content"
                    placeholder="Start writing your article here..."
                ></textarea>

                <p id="contentError" class="error"></p>

                <!-- Cover Image -->

                <label for="image">Cover Image</label>

                <input
                    type="file"
                    id="image"
                    accept="image/*"
                >

                <p id="imageError" class="error"></p>

                <button type="submit">

                    Publish Blog

                </button>

            </form>

        </section>

    </main>

    <!-- =========================
            Footer
    ========================== -->

    <footer>

        <p>© 2026 Blog Manager</p>

    </footer>

    <script src="js/script.js"></script>

</body>

</html>
